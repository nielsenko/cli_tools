name: serverpod_logging_cli
description: >-
  A cli_tools.Logger bridge for the serverpod_logging architecture, rendering
  scoped logs and progress to the terminal.
version: 0.1.0
repository: https://github.com/serverpod/serverpod
homepage: https://serverpod.dev
issue_tracker: https://github.com/serverpod/serverpod/issues

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  cli_tools: ^0.13.1
  serverpod_logging: ^0.1.0

dev_dependencies:
  serverpod_lints: '>=2.7.0'
  test: ^1.25.6
